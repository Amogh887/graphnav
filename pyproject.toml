[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "codex-graphify"
version = "0.1.0"
description = "Codex CLI with per-service knowledge-graph context injection for monorepos"
requires-python = ">=3.11"
dependencies = ["graphifyy>=0.8"]

[project.scripts]
codex-graph = "codex_graph.cli:main"

[project.optional-dependencies]
dev = ["pytest>=8", "anthropic>=0.40"]

[tool.setuptools.packages.find]
where = ["."]
include = ["codex_graph*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
